[mypy]
python_version = 3.12
mypy_path = src
explicit_package_bases = True
namespace_packages = True
plugins = pydantic.mypy

files = src, tests

;mypy_path = src, ../41_pchandler/src

show_error_codes = true
pretty = true

# Warnings & strictness
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
strict = true

# If strictness is too much, disable and selectively enable:
# disallow_untyped_defs = true
# disallow_untyped_calls = true
# disallow_any_generics = true
# no_implicit_optional = true
# warn_return_any = true


# If you have other untyped deps, ignore them individually, but NOT pchandler
;[mypy-numpy.*]
;ignore_missing_imports = true

[mypy-joblib.*]
ignore_missing_imports = true

[mypy-open3d.*]
ignore_missing_imports = true

# Auto-generated at install time by setuptools_scm; not checked into git, so
# pre-commit mypy in CI (which runs before any install step) can't resolve the
# import in src/GSEGUtils/__init__.pyi. Matches the `joblib`/`open3d`
# external-untyped pattern. Local dev hits this via `pip install -e .` writing
# _version.py to disk before mypy runs.
[mypy-GSEGUtils._version]
ignore_missing_imports = true

# Pre-existing structural mypy/numpydantic incompatibility, surfaced for the
# first time by Plan 01-03a (the mypy hook was previously --no-verify'd because
# of the `scripts/` drift). The affected modules use numpydantic NDArray[Shape,
# Dtype] aliases that mypy cannot statically resolve (numpydantic uses runtime
# metaclasses). Tracked for a follow-up FRAG/Phase 6 plan; do not lift these
# overrides without authoring the per-module fixes first. See
# `.planning/phases/01-cross-repo-foundation/01-03a-SUMMARY.md`.
[mypy-GSEGUtils.base_types]
ignore_errors = true

[mypy-GSEGUtils.base_arrays]
ignore_errors = true

[mypy-GSEGUtils.validators]
ignore_errors = true

[mypy-GSEGUtils.util]
ignore_errors = true

[mypy-GSEGUtils.lazy_disk_cache.lazy_disk_cache]
ignore_errors = true

[mypy-GSEGUtils.lazy_disk_cache.disk_backed_ndarray]
ignore_errors = true

[mypy-GSEGUtils.lazy_disk_cache.disk_backed_store]
ignore_errors = true

[mypy-GSEGUtils.generate_init_stubs]
ignore_errors = true

[mypy-GSEGUtils.singleton]
ignore_errors = true

# Test modules exercise the same numpydantic surface and inherit the same
# strict-mode mypy/numpydantic incompatibility. Tracked for the same follow-up.
[mypy-tests.*]
ignore_errors = true
